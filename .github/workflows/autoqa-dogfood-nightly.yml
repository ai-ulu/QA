name: AutoQA Dogfood Nightly

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dogfood-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Clone repo and run dogfood
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 "https://github.com/${GITHUB_REPOSITORY}.git" "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm install --frozen-lockfile
          pnpm dogfood:nightly
          cat packages/mcp-server/reports/autoqa-dogfood-latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish nightly release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="autoqa-dogfood-nightly-$(date -u +%Y%m%d)"
          title="AutoQA Dogfood Nightly $(date -u +%Y-%m-%d)"
          notes="Nightly dogfood report for ${GITHUB_REPOSITORY} at ${GITHUB_SHA}."
          assets=(
            "packages/mcp-server/reports/autoqa-dogfood-latest.md"
            "packages/mcp-server/reports/autoqa-dogfood-latest.json"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "$title" --notes "$notes" --target "$GITHUB_SHA"
          fi
