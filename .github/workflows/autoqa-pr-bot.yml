name: AutoQA PR Bot

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  autoqa-pr-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upsert AutoQA PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          pnpm pr:comment -- --repo . --pr ${{ github.event.pull_request.number }}
