name: AutoQA Impact

on:
  pull_request:
  workflow_dispatch:

jobs:
  qa-impact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate AutoQA summary
        run: node packages/mcp-server/scripts/ci-impact.mjs --repo "${{ github.workspace }}" --auto-base --format github > autoqa-ci-summary.md

      - name: Publish step summary
        run: cat autoqa-ci-summary.md >> "$GITHUB_STEP_SUMMARY"
